name: hotel_app
description: "一個 Flutter 飯店預訂應用"
published: false

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  cupertino_icons: ^1.0.0
  dio: ^5.0.0
  flutter:
    sdk: flutter
  go_router: ^12.0.0
  google_fonts: ^6.0.0
  http: ^1.1.0
  intl: ^0.19.0
  json_annotation: ^4.8.0
  json_serializable: ^6.0.0
  logger: ^2.0.0
  provider: ^6.0.0
  shared_preferences: ^2.2.0
  uuid: ^4.0.0

dev_dependencies:
  build_runner: ^2.4.0
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/    # ⬅️ 確保加入了這一行
